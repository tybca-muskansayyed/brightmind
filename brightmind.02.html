<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>
    <link
    rel="stylesheet"
    href="http://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="qotainer">
    <div class="form-section">
        <!-- Login Form -->
         <div class="form-container active"  id="loginform"></div>
         <h1 class="form-title">Welcome Back</h1>
         <p class="form-substitle">Sign in to your account to continue your journey</p>

         <form id="loginFormSubmit">
            <div class="form-group">
                <input type="email" class="form-control" placeholder="Email Address" required>
                <i class="fas fa-envelope"></i>
            </div>

            <div class="form-group">
                <input type="password" class="form-control" placeholder="password" required>
                <i class="fas fa-envelope"></i>

                <div class="forgot-password">
                    <a href="#" onclick="showForgetpassword()">Forget password></a>
                    </div>

                    <button class="btn-primary" type="submit">
                       <i class="fas fa-spinner loading"></i> 
                        <span class="btn-text">Sign In</span>
                    </button>
                </form>

                <div class="social-login">
                    <div class="social-title">Or continue with</div>
                    <div class="social-button">
                    <div class="social-btn google" onclick="socialLogin('google')"></div>
                    <i class="fab fa-google"></i>
                    </div>

                    <div class="social-btn facebook" onclick="socialLogin('facebook')"></div>
                    <i class="fab fa-facebook-f"></i>
                </div>

                <div class="social-btn instagram" onclick="socialLogin('instagram')"></div>
                    <i class="fab fa-instagram"></i>
            </div>
            </div>
        </div>
         
        <div class="form-switch">
            Don't have an account? <a href="#" onclick="showSignup()">Create one </a>
            </div>
        </div>
    </div>
